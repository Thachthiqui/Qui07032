<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title> Đăng Nhập</title>

    <style>

        body{
            background: white;
            font-family: Arial;
        }

        /* Khung ngoài */
        .container{
            width: 350px;
            margin: 20px auto;
            background: green;
            padding: 12px;
        }

        /* Khung trong */
        .form-box{
            background: #d9d9d9;
            padding: 20px;
        }

        h1{
            margin-bottom: 30px;
        }

        /* Ô nhập */
        input[type="text"],
        input[type="password"]{
            width: 100%;
            height: 40px;
            margin-top: 10px;
            margin-bottom: 10px;

            border: none;
            border-bottom: 3px solid red;

            background: white;
            padding-left: 10px;
            font-size: 16px;
        }

        /* Chữ */
        label{
            font-size: 25px;
        }

        /* Radio và checkbox */
        .option{
            margin-top: 15px;
            font-size: 20px;
        }

        /* Nút */
        button{
            margin-top: 25px;
            width: 130px;
            height: 50px;

            background: #00b894;
            color: white;

            border: 3px solid #00a383;

            font-size: 22px;
            cursor: pointer;
        }

        button:hover{
            background: #00997a;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="form-box">

            <h1>Đăng nhập</h1>

            <!-- Tên đăng nhập -->
            <input type="text">

            <label>Tên đăng nhập</label>

            <!-- Mật khẩu -->
            <input type="password">

            <label>Mật khẩu</label>

            <!-- Giới tính -->
            <div class="option">

                <input type="radio" name="gt" checked>
                Nam

                <br>

                <input type="radio" name="gt">
                Nữ

                <br>

                <input type="checkbox">
                Lưu giá trị đăng nhập
            </div>

            <!-- Nút -->
            <button>
                Đăng nhập
            </button>
        <ul class="nav nav-pills flex-column">
        <li class="nav-item">
          <a class="nav-link active" href="index.html">Trở về trang chủ</a>
        </li></ul>
        </div>

    </div>

</body>

</html>
